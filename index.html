<template id="s8-tpl"><div class="ps" style="color:#10b981">STEP 8 &mdash; ACTIONABLE INSIGHTS</div><h3>&#9989; Insights + Air8 Risk Signal</h3><div class="pd" style="margin-bottom:10px;font-size:10.5px">Each card: <span style="color:#10b981">WHY</span> it hits them &rarr; <b style="color:#34d399">Air8 risk signal</b> (expand / conditional / caution) &rarr; <span style="color:#a5b4fc">WHAT</span> to do &rarr; sub-scenarios where same persona gets a <b>different playbook</b>.</div><div class="p8-card" style="border-left-color:#10b981"><div class="p8-head"><span class="p8-name">&#127470;&#127475; India Large Vertical</span><span class="p8-combo">COMBO-003 &middot; $50M+</span></div><div class="p8-risk p8-risk-grow">&#9989; AIR8: EXPAND &mdash; MONITOR POST-OCT REVERSAL</div><div class="p8-lbl p8-lbl-why">WHY THIS EVENT HITS THEM</div><div class="p8-why">COMBO-003 buys raw cotton directly. Cotton = <b>60-70% COGS</b>. Previous 11% duty forced domestic MSP cotton at ~$0.87/kg. At 0%: import at ~$0.76/kg on the imported portion &rarr; <b>blended saving 5-8% on total cotton cost</b> (many mills blend imported with domestic MSP cotton, so the full 11% applies only to the imported share), +1-2% gross margin uplift. Domestic price softens but <b>MSP acts as a floor</b> &mdash; CCI buys at MSP if market falls below it. India now at <b>raw material / yarn cost parity</b> with BD/VN on imported cotton &mdash; end-product competitiveness still depends on labour, efficiency, and product mix.</div><div class="p8-lbl p8-lbl-air8">AIR8 RISK SIGNAL</div><div class="p8-air8-box "><b>Growing trend &mdash; event directly improves margin and competitive position.</b> PreShip-OBF self-liquidates: cotton &rarr; production &rarr; ARP receivables within 120-180 days. <b>Low Air8 risk. Expand</b> &mdash; but build post-Oct cliff into drawdown schedule; duty reverts Nov 1 and mills that over-stockpiled face elevated WC needs into Q1 2027.</div><div class="p8-lbl p8-lbl-what">WHAT TO DO</div><div class="p8-what-row"><div class="p8-num">1</div><div class="p8-what-text">Import 3-5 months cotton before <b>Oct 31 cliff</b> &mdash; duty reverts after that, cost advantage disappears</div></div><div class="p8-what-row"><div class="p8-num">2</div><div class="p8-what-text">Lock downstream supply contracts at new cost base before buyers discover your input cost fell</div></div><div class="p8-what-row"><div class="p8-num">3</div><div class="p8-what-text">Position for yarn export to China &mdash; Indian yarn demand from CN mills is likely to increase as Keqiao sources cheaper input; monitor spot pricing before committing volumes</div></div><div class="p8-what-row"><div class="p8-num">4</div><div class="p8-what-text">Plan working capital for the stockpile surge &mdash; WC need increases 30-50%; bank OD will be the first constraint to hit</div></div><div class="p8-lbl p8-lbl-scen">&#9655; KEY SCENARIOS</div><div class="p8-scen" style="border-color:#10b98133"><div class="p8-scen-title" style="color:#10b981">IF: GOTS-Certified Organic Lines</div><div class="p8-scen-why">COMBO-008 primarily sources certified organic cotton from domestic farmer programs &mdash; India is the world's #1 organic cotton producer (51% global supply). Domestic supply is plentiful and embedded in their certification chain. Note: some mills do import specialty blended yarns (e.g., organic/linen, organic/modal mixes) where the 0% duty applies to the cotton component. For <b>pure organic cotton lines the saving largely does not apply</b>. The blended 5-8% saving applies only to conventional cotton lines.</div><div class="p8-scen-air8" style="color:#10b981bb">&#9656; Air8: Expand on conventional lines. Organic lines are largely unchanged &mdash; only check whether specialty blend yarns are imported (small exposure). Key Air8 risk: verify factory records keep conventional and certified-organic streams separate. If mixed, GOTS certification loss far outweighs any cotton cost saving.</div><div class="p8-scen-what">No change needed on organic lines &mdash; domestic sourcing continues as normal, no import required. Import cheaper global cotton for conventional lines only. <b>Key risk:</b> keep the two cotton streams physically and documentarily separate. Mixing conventional imported cotton into GOTS-certified production voids the certification &mdash; a far greater loss than the cost saving is worth.</div></div><div class="p8-scen" style="border-color:#f59e0b33"><div class="p8-scen-title" style="color:#f59e0b">IF: October 31 Cliff Approaches</div><div class="p8-scen-why">The duty exemption ends Oct 31. Any cotton imported after that date reverts to 11% duty. Factories that stockpiled early capture the full window; those who delayed get less.</div><div class="p8-scen-air8" style="color:#f59e0bbb">&#9656; Air8: Air8 PreShip-OBF drawdown should align with cotton import schedule &mdash; front-load in Jun-Jul, reduce by Sep-Oct as stockpile completes.</div><div class="p8-scen-what">Plan production capacity to absorb 3-5 months of imported cotton. Front-load procurement Jun-Jul; reduce by Sep-Oct as stockpile completes before the Oct 31 cliff.</div></div></div><div class="p8-card" style="border-left-color:#ec4899"><div class="p8-head"><span class="p8-name">&#127463;&#127465; Bangladesh CMT (Local-Only)</span><span class="p8-combo">COMBO-002-ENH &middot; $5-20M</span></div><div class="p8-risk p8-risk-mon">&#9888; AIR8: CAUTION &mdash; MONITOR CLOSELY</div><div class="p8-lbl p8-lbl-why">WHY THIS EVENT HITS THEM</div><div class="p8-why"><b>Competitive pressure building:</b> India structurally cost competitive in a mid-single-digit range depending on product/spec &mdash; on basic volume T-shirts BD often still cheaper on total landed cost; pressure is most acute on mid-range cotton basics for EU fast-fashion buyers. <b>On fabric sourcing:</b> BD CMT factories have buyer-nominated fabric ~90% &mdash; cheaper Indian cotton does not directly lower their input cost. <b>Indirect benefit (delayed, uncertain):</b> Industry imports ~60% yarn from India (varies by segment; balance from China, Pakistan, and local mills); if spinners pass savings, yarn prices may fall (90-180 day lag). <b>Risk:</b> BD and China both increasing Indian yarn demand may keep prices elevated. LDC graduation (Nov 2026) compounds pressure.</div><div class="p8-lbl p8-lbl-air8">AIR8 RISK SIGNAL</div><div class="p8-air8-box warn"><b>Direction uncertain &mdash; competitive pressure growing.</b> Selective expansion is possible with strong buyers and clear market visibility; avoid broad expansion. Watch for combined early warning signals (see scenarios). If signals deteriorate, reduce advance ratio proactively. <b>Existing facilities: hold but review quarterly. New facilities: selective &mdash; require strong buyer mix + stable PO trend before approving.</b></div><div class="p8-lbl p8-lbl-what">WHAT TO DO</div><div class="p8-what-row"><div class="p8-num">1</div><div class="p8-what-text">For FOB sourcing portion: lock Indian yarn contracts at today's price &mdash; before spinners reprice and before demand surge absorbs the discount</div></div><div class="p8-what-row"><div class="p8-num">2</div><div class="p8-what-text">Lead buyer conversations with EBA advantage: BD zero-duty EU until 2029 vs India 12% EU GSP</div></div><div class="p8-what-row"><div class="p8-num">3</div><div class="p8-what-text">Explore selective shift to blended specs where buyer allows &mdash; India advantage is cotton-specific, but do not force across the board</div></div><div class="p8-what-row"><div class="p8-num">4</div><div class="p8-what-text">Prioritise order fulfilment reliability over volume growth &mdash; consistent on-time delivery is the main defence against buyer diversion to India</div></div><div class="p8-lbl p8-lbl-scen">&#9655; KEY SCENARIOS</div><div class="p8-scen" style="border-color:#10b98133"><div class="p8-scen-title" style="color:#10b981">IF: Has Sourcing / Operations in India</div><div class="p8-scen-why">BD company with India sourcing (COMBO-013). Sources cotton/yarn directly in India at 0% duty. Bypasses 90-180d yarn lag and buyer-nominated constraint.</div><div class="p8-scen-air8" style="color:#10b981bb">&#9656; Air8: Can consider expansion via India entity only, not BD entity. Structure facility through India operations.</div><div class="p8-scen-what">India unit procures at lower cost. BD garment side benefits from cheaper internal supply &mdash; a structural advantage vs pure-BD peers.</div></div><div class="p8-scen" style="border-color:#ef444433"><div class="p8-scen-title" style="color:#ef4444">IF: Multiple Warning Signals Trigger Simultaneously</div><div class="p8-scen-why">No single signal in isolation is sufficient to act. Watch for a combination: PO volume declining, payment cycles lengthening, and utilisation rate falling. Two or more in the same quarter indicates order diversion pressure is real and the risk profile is shifting.</div><div class="p8-scen-air8" style="color:#ef4444bb">&#9656; Air8: When 2-3 signals trigger together: reduce advance ratio to 70% max and flag for monthly review. Single-signal deterioration: increase monitoring frequency but hold position. Evaluate exit vs reduced facility only after multi-signal confirmation.</div><div class="p8-scen-what">Monitor three signals: (1) PO volume trend, (2) payment speed vs agreed terms, (3) utilisation rate. Any deterioration on 2+ in the same quarter = escalate to credit review.</div></div></div><div class="p8-card" style="border-left-color:#ef4444"><div class="p8-head"><span class="p8-name">&#127464;&#127475; China Full Package</span><span class="p8-combo">COMBO-004-ENH &middot; $20-80M</span></div><div class="p8-risk p8-risk-cond">&#9888; AIR8: CONDITIONAL &mdash; VERIFY BUYER MIX FIRST</div><div class="p8-lbl p8-lbl-why">WHY THIS EVENT HITS THEM</div><div class="p8-why"><b>CN factories source fabric from Keqiao mills (Shaoxing, Zhejiang)</b> &mdash; Keqiao is the world's largest fabric trading market. CN garment factories do not buy cotton directly; they buy fabric from Keqiao mills who source yarn globally including from India. As Indian cotton gets cheaper, Keqiao mills' input cost may fall &rarr; pass-through is possible but not immediate or full: Keqiao mills source yarn from multiple origins and manage exposure via futures/FX contracts, so benefit to CN factories arrives with a lag and is partial. <b>But the threat is real:</b> India garment factories also become more competitive on same cotton categories. With US tariffs on CN at 25-50% and India's cotton cost now lower, India has a structural cost advantage on US-bound cotton T-shirts. <b>CN share of US apparel: 33% (2017) &rarr; 21% (2025) &mdash; a pre-existing trend this event accelerates.</b></div><div class="p8-lbl p8-lbl-air8">AIR8 RISK SIGNAL</div><div class="p8-air8-box "><b>Direction depends entirely on buyer mix.</b> EU &gt;50% and growing: receivables stable, facility justified &mdash; EU buyers value CN speed and Keqiao fabric depth, not de-sourcing from CN. US-heavy: receivables from buyers actively reducing CN orders &mdash; Air8 would be financing a shrinking book. <b>Check PO trend by buyer before approving any facility.</b></div><div class="p8-lbl p8-lbl-what">WHAT TO DO</div><div class="p8-what-row"><div class="p8-num">1</div><div class="p8-what-text">Pre-position with Keqiao fabric/yarn <b>now</b> &mdash; most Keqiao trade is spot market so fixed contracts are limited, but forward PO commitments and relationship pricing can secure some advantage before mills adjust</div></div><div class="p8-what-row"><div class="p8-num">2</div><div class="p8-what-text">Optimise procurement mix by order destination and compliance needs: Xinjiang cotton remains viable for domestic/non-US orders; redirect to non-Xinjiang or Indian-origin fabric for US/EU compliance-sensitive production</div></div><div class="p8-what-row"><div class="p8-num">3</div><div class="p8-what-text">Accelerate EU/Japan buyer acquisition &mdash; CN tariff to EU 0-12%, and Keqiao speed gives 2-3 week turnaround; China maintains this speed advantage though India is narrowing the gap</div></div><div class="p8-what-row"><div class="p8-num">4</div><div class="p8-what-text">Accept declining US commodity T-shirt volume; redirect lines to complex prints, DTC co-development, special finishes</div></div><div class="p8-lbl p8-lbl-scen">&#9655; KEY SCENARIOS</div><div class="p8-scen" style="border-color:#10b98133"><div class="p8-scen-title" style="color:#10b981">IF: EU &gt;50% Revenue, Deep Keqiao Network</div><div class="p8-scen-why">EU buyers are not de-sourcing from CN. Keqiao speed (2-3 week EU turnaround vs 4+ weeks from India) is a structural advantage for fast fashion. EU receivables are stable and growing.</div><div class="p8-scen-air8" style="color:#10b981bb">&#9656; Air8: Expand. PreShip-OBF for Keqiao sourcing. ARP on EU receivables (H&M, Zara &mdash; low dilution 1-5%). Hengqin entity caps: single company &le;40% of portfolio.</div><div class="p8-scen-what">Use lower Keqiao fabric cost + CN speed to offer EU buyers faster turnaround &mdash; this is the counter-attack against India's price advantage.</div></div><div class="p8-scen" style="border-color:#ef444433"><div class="p8-scen-title" style="color:#ef4444">IF: US-Heavy Mix (&gt;40% US Revenue)</div><div class="p8-scen-why">US buyers are actively reducing CN orders (33% &rarr; 21% market share over 8 years). This event accelerates that. Air8 facility would finance fewer and fewer invoices each year &mdash; structural book-size risk, not just credit risk on individual invoices.</div><div class="p8-scen-air8" style="color:#ef4444bb">&#9656; Air8: Do not expand. For existing facility: monitor PO volume quarterly. If US buyer orders decline &gt;10% YoY, reduce advance ratio and do not renew facility at same size.</div><div class="p8-scen-what">Do not defend US commodity basics on price. Retain only technical/co-developed US orders. Pivot capacity to EU/Japan where CN still wins on speed.</div></div></div><div class="p8-card" style="border-left-color:#06b6d4"><div class="p8-head"><span class="p8-name">&#127481;&#127479; Turkey Denim Specialist</span><span class="p8-combo">COMBO-005-ENH &middot; $20-50M</span></div><div class="p8-risk p8-risk-cond">&#9888; AIR8: CONDITIONAL &mdash; ISTANBUL ONLY</div><div class="p8-lbl p8-lbl-why">WHY THIS EVENT HITS THEM</div><div class="p8-why">Denim = <b>95% cotton</b>. Turkey sources from Turkish/Japanese mills &mdash; not Indian cotton directly, so 0% duty does not reduce their input cost. Threat comes from the other direction: Indian denim mills get cheaper cotton &rarr; can undercut Turkey on basic jeans in EU. BUT Turkey moat = <b>laser/ozone finishing consistency + 2-3 day EU shipping</b>. Zara's reorder model (14-day turnaround) cannot work with India's 30-day shipping. Turkey still leads on finishing quality and proximity in 2026; India is catching up &mdash; monitor competitive signals and EU buyer diversification closely, as protection is not unconditional. Real risk 18+ months out as Indian mills invest cotton savings into finishing technology.</div><div class="p8-lbl p8-lbl-air8">AIR8 RISK SIGNAL</div><div class="p8-air8-box "><b>TRY macro is systemic but EUR-denominated ARP self-hedges it</b> &mdash; supplier earns EUR, Air8 charges EUR. Istanbul premium denim (Zara/H&M direct, full finishing) = stable EU receivables. <b>Interior Turkey value denim: do not expand, monitor buyer PO trend closely.</b></div><div class="p8-lbl p8-lbl-what">WHAT TO DO</div><div class="p8-what-row"><div class="p8-num">1</div><div class="p8-what-text">No emergency pivot needed &mdash; Turkey finishing lead and EU proximity provide strong 2026 defence; monitor EU buyer diversification signals as protection is not absolute</div></div><div class="p8-what-row"><div class="p8-num">2</div><div class="p8-what-text">Use global cotton softening as leverage when negotiating with Turkish fabric mills on next season pricing &mdash; factor in energy cost trajectory and TRY/EUR dynamics which can offset raw material gains</div></div><div class="p8-what-row"><div class="p8-num">3</div><div class="p8-what-text">Accelerate eco-denim investment (laser/ozone) &mdash; EU ESPR 2027 mandates sustainability data India cannot yet provide</div></div><div class="p8-what-row"><div class="p8-num">4</div><div class="p8-what-text">Prepare EU buyer brief: 14-day TR vs 30-day India = 2 lost Zara selling cycles per season</div></div><div class="p8-lbl p8-lbl-scen">&#9655; KEY SCENARIOS</div><div class="p8-scen" style="border-color:#10b98133"><div class="p8-scen-title" style="color:#10b981">IF: Istanbul Premium &mdash; Zara/H&M Direct</div><div class="p8-scen-why">Full laser/ozone capability + direct Zara/H&M relationships. Structurally protected from India in 2026. Receivables high-quality, low dilution 2-3%, reliable payment.</div><div class="p8-scen-air8" style="color:#10b981bb">&#9656; Air8: Expand. EUR-denominated ARP on Zara/H&M receivables. PreShip-OBF for Zara reorder urgency (14-day turnaround requires same-day fabric procurement).</div><div class="p8-scen-what">Stay the course. Use cotton softening as leverage on Turkish mill pricing. Invest margin gain in CSDDD digital compliance data &mdash; competitive weapon from 2027.</div></div><div class="p8-scen" style="border-color:#f59e0b33"><div class="p8-scen-title" style="color:#f59e0b">IF: Interior Turkey &mdash; Value Denim (Düzce/Malatya)</div><div class="p8-scen-why">Basic jeans, no finishing moat, price-sensitive buyers. India will challenge this segment within 18 months as Indian denim mills invest their cotton savings. Buyer may start diverting orders before Air8 facility matures.</div><div class="p8-scen-air8" style="color:#f59e0bbb">&#9656; Air8: Do not expand. Monitor buyer PO trend quarterly. If orders decline &gt;15% YoY, reduce advance ratio proactively and do not renew at same size.</div><div class="p8-scen-what">Watch for signals: buyer requesting price reductions, RFQ frequency dropping, sample orders from Indian denim mills. Any 2 signals in same quarter = flag for review.</div></div></div><div class="p8-card" style="border-left-color:#8b5cf6"><div class="p8-head"><span class="p8-name">&#127477;&#127472; Pakistan Home Textile / Denim</span><span class="p8-combo">COMBO-009 &middot; $10-50M</span></div><div class="p8-risk p8-risk-mon">&#9888; AIR8: CAUTION &mdash; DO NOT EXPAND, MONITOR EXISTING</div><div class="p8-lbl p8-lbl-why">WHY THIS EVENT HITS THEM</div><div class="p8-why">Pakistan is a <b>cotton producer</b> &mdash; different dynamic. PK mills buy domestic cotton, not Indian. Event does not lower their input cost directly. Threat: India mills at a cotton cost advantage that varies &mdash; the spread is not constant and narrows at certain price/FX points &mdash; but structurally positions India to undercut PK FOB on home textiles and denim with the same US/EU buyers. Energy crisis adds +10-20% production cost on top. PK ELS long-staple cotton is a quality asset but insufficient to offset the price gap at commodity scale.</div><div class="p8-lbl p8-lbl-air8">AIR8 RISK SIGNAL</div><div class="p8-air8-box warn"><b>Three overlapping pressures all trending worse:</b> energy crisis, high bank rates (15-22%), India competition on core categories. Do not expand. For existing facilities: monitor repayment, watch buyer PO trends, be ready to reduce advance ratio if signals deteriorate. <b>Not an automatic exit &mdash; ELS premium sub-segment may still be defensible.</b></div><div class="p8-lbl p8-lbl-what">WHAT TO DO</div><div class="p8-what-row"><div class="p8-num">1</div><div class="p8-what-text">Buy domestic PK cotton now &mdash; India import surge may soften PK domestic prices slightly; lock before any reversal</div></div><div class="p8-what-row"><div class="p8-num">2</div><div class="p8-what-text">Differentiate on ELS (Extra-Long Staple) cotton from Punjab &mdash; softer, more durable towels India cannot match at scale</div></div><div class="p8-what-row"><div class="p8-num">3</div><div class="p8-what-text">For US buyers: leverage UFLPA traceability &mdash; PK cotton origin is documentable and clearly non-Xinjiang</div></div><div class="p8-what-row"><div class="p8-num">4</div><div class="p8-what-text">Lobby on energy stabilisation &mdash; energy cost gap is the bigger structural problem long-term</div></div><div class="p8-lbl p8-lbl-scen">&#9655; KEY SCENARIOS</div><div class="p8-scen" style="border-color:#f59e0b33"><div class="p8-scen-title" style="color:#f59e0b">IF: Premium ELS Towels &mdash; Verified Quality Story</div><div class="p8-scen-why">PK ELS cotton produces measurably higher quality towels. India does not have ELS at equivalent scale. Defensible 5-8% premium vs commodity India.</div><div class="p8-scen-air8" style="color:#f59e0bbb">&#9656; Air8: Conditional: ARP only on premium-range buyer POs. Monitor monthly. Verify ELS certification and buyer PO trend before approving.</div><div class="p8-scen-what">Position explicitly as premium ELS. Quantify quality difference with durability and hand-feel data. A documented quality story is the only sustainable differentiator here.</div></div><div class="p8-scen" style="border-color:#ef444433"><div class="p8-scen-title" style="color:#ef4444">IF: Repayment or PO Signal Deteriorates</div><div class="p8-scen-why">If buyer PO volume falls &gt;15%, payment cycles lengthen, or dilution rate increases &mdash; signals that India is winning the price battle and BD factory is absorbing the hit.</div><div class="p8-scen-air8" style="color:#ef4444bb">&#9656; Air8: Reduce advance ratio to 65% max. Shorten review cycle to monthly. If 2+ signals deteriorate in same quarter, consider reducing facility size.</div><div class="p8-scen-what">Early warning checklist: invoice frequency, payment speed vs agreed terms, dilution rate trend, buyer RFQ engagement. Review all four quarterly.</div></div></div><div class="fb">&#9989; 5 personas &middot; Sourcing logic per persona &middot; Expand/Conditional/Caution &middot; 10 sub-scenarios</div></template>
